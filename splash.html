
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      box-sizing: border-box;
    }
    .logo-container {
      margin-bottom: 24px;
      animation: pulse 2s infinite ease-in-out;
    }
    .app-name {
      font-size: 24px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 8px;
      letter-spacing: -0.025em;
    }
    .app-subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
    }
    .loader {
      width: 40px;
      height: 4px;
      background: #f1f5f9;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: #00854b;
      position: absolute;
      animation: loading 1.5s infinite ease-in-out;
      border-radius: 2px;
    }
    .version {
      position: absolute;
      bottom: 20px;
      font-size: 10px;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    @keyframes loading {
      0% { left: -40%; }
      100% { left: 100%; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
  </style>
</head>
